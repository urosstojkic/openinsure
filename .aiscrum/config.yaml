# AiScrum Pro Configuration for OpenInsure
#
# AI-native core insurance platform — Python/FastAPI backend + React dashboard
# Built with Squad framework (9 domain agents) + claude-code-prompts patterns
#
# Sprint engine orchestrates GitHub Copilot CLI via ACP to execute sprints:
#   refinement → planning → parallel execution → review → retro

project:
  name: "openinsure"
  base_branch: "main"

copilot:
  executable: "copilot"
  max_parallel_sessions: 4
  session_timeout_ms: 900000        # 15 min — Foundry agent calls take 10-30s
  auto_approve_tools: true

  mcp_servers:
    - name: "github"
      type: "stdio"
      command: "npx"
      args: ["-y", "@github/mcp-server"]

  phases:
    planner:
      model: "claude-opus-4.6"       # Strategic planning needs best reasoning
    worker:
      model: "claude-sonnet-4.5"     # Implementation — fast + capable
    reviewer:
      model: "claude-opus-4.6"       # Review needs deep understanding

sprint:
  prefix: "Sprint"
  min_issues: 3
  max_issues: 8
  max_drift_incidents: 2            # Escalate after 2 unplanned scope additions
  max_retries: 2
  enable_challenger: true           # Adversarial reviewer (claude-code-prompts verification pattern)
  enable_tdd: false
  backlog_labels: []

quality_gates:
  require_tests: true
  require_lint: true
  require_types: false              # Python — mypy run separately in lint
  require_build: true               # Dashboard build must pass
  max_diff_lines: 500
  test_command:      ["python", "-m", "pytest", "tests/", "-x", "-q", "--ignore=tests/e2e", "--ignore=tests/integration", "-k", "not sql and not database"]
  lint_command:      ["python", "-m", "ruff", "check", "src/"]
  typecheck_command: ["python", "-m", "ruff", "check", "src/"]    # ruff covers type issues
  build_command:     ["bash", "-c", "cd dashboard && npm run build"]
  require_challenger: true          # Wire to Verification Specialist charter

escalation:
  notifications:
    ntfy: false
    ntfy_topic: "${NTFY_TOPIC}"

git:
  worktree_base: "../openinsure-worktrees"
  branch_pattern: "sprint/{sprint}/issue-{issue}"
  auto_merge: true
  squash_merge: true
  delete_branch_after_merge: true

github: {}
