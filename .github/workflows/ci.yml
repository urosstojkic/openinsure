name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Type check with mypy
        run: mypy src/openinsure/

      - name: Security scan with bandit
        run: bandit -r src/openinsure/ -ll -f json -o bandit_results.json || true

      - name: Post bandit results as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🔒 Bandit Security Scan\n\n';
            try {
              const results = JSON.parse(fs.readFileSync('bandit_results.json', 'utf8'));
              const issues = results.results || [];
              if (issues.length === 0) {
                body += '✅ No security issues found.\n';
              } else {
                body += `⚠️ Found **${issues.length}** issue(s):\n\n`;
                for (const issue of issues.slice(0, 20)) {
                  body += `- **${issue.issue_severity}** ${issue.issue_text} (\`${issue.filename}:${issue.line_number}\`)\n`;
                }
                if (issues.length > 20) {
                  body += `\n...and ${issues.length - 20} more.\n`;
                }
              }
            } catch (e) {
              body += '✅ No security issues found (scan passed cleanly).\n';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=src/openinsure --cov-report=xml --cov-fail-under=40

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build
