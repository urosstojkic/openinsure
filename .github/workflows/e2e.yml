# E2E Tests Workflow
# Runs Playwright E2E tests on PR to main with a local backend

name: E2E Tests

on:
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      # Use in-memory storage — no external DB needed
      backend:
        image: python:3.12-slim
        options: --health-cmd "echo ok" --health-interval 10s --health-timeout 5s --health-retries 3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install backend dependencies
        run: |
          pip install -e ".[dev]" --quiet

      - name: Start backend server
        run: |
          OPENINSURE_STORAGE_MODE=memory \
          OPENINSURE_DEBUG=true \
          uvicorn openinsure.main:app --host 0.0.0.0 --port 8000 &
          # Wait for backend to be ready
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Install Playwright browsers
        working-directory: dashboard
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: dashboard
        run: npx playwright test --retries=2
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: dashboard/test-results/
          retention-days: 7

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: dashboard/playwright-report/
          retention-days: 7
