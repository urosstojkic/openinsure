name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write # For Azure OIDC login

jobs:
  deploy:
    # CD is disabled until Azure OIDC secrets are configured.
    # To enable: add AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID secrets
    # then remove the 'false &&' below.
    if: ${{ false && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & Push Backend
        run: |
          az acr build --registry openinsuredevacr \
            --image openinsure-backend:${{ github.event.workflow_run.head_sha }} \
            --image openinsure-backend:latest \
            --file Dockerfile . \
            --no-logs \
            --cache-from type=registry,ref=openinsuredevacr.azurecr.io/openinsure-backend:latest

      - name: Build & Push Dashboard
        run: |
          az acr build --registry openinsuredevacr \
            --image openinsure-dashboard:${{ github.event.workflow_run.head_sha }} \
            --image openinsure-dashboard:latest \
            --file dashboard/Dockerfile dashboard/ \
            --no-logs \
            --cache-from type=registry,ref=openinsuredevacr.azurecr.io/openinsure-dashboard:latest

      - name: Deploy Backend
        run: |
          az containerapp update \
            --name openinsure-backend \
            --resource-group openinsure-dev-sc \
            --image openinsuredevacr.azurecr.io/openinsure-backend:${{ github.event.workflow_run.head_sha }} \
            --output none

      - name: Deploy Dashboard
        run: |
          az containerapp update \
            --name openinsure-dashboard \
            --resource-group openinsure-dev-sc \
            --image openinsuredevacr.azurecr.io/openinsure-dashboard:${{ github.event.workflow_run.head_sha }} \
            --output none

      - name: Smoke Test
        run: |
          pip install httpx
          python scripts/smoke_test.py https://openinsure-backend.proudplant-9550e5a5.swedencentral.azurecontainerapps.io
