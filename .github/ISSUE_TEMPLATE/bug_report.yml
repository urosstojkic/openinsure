name: Bug Report
description: Report a bug in OpenInsure
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please provide details below.
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clearly describe the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Send a POST request to /api/v1/submissions with...
        2. Observe that...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - Submission Intake
        - Underwriting
        - Policy Administration
        - Claims Management
        - Billing & Payments
        - Compliance
        - Agent Framework
        - Knowledge Base
        - API
        - Infrastructure
        - Other
    validations:
      required: true
