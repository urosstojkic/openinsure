server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass https://openinsure-backend.braveriver-f92a9f28.swedencentral.azurecontainerapps.io;
        proxy_set_header Host openinsure-backend.braveriver-f92a9f28.swedencentral.azurecontainerapps.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    location /health {
        proxy_pass https://openinsure-backend.braveriver-f92a9f28.swedencentral.azurecontainerapps.io;
        proxy_set_header Host openinsure-backend.braveriver-f92a9f28.swedencentral.azurecontainerapps.io;
        proxy_ssl_server_name on;
    }

    location /docs {
        proxy_pass https://openinsure-backend.braveriver-f92a9f28.swedencentral.azurecontainerapps.io;
        proxy_set_header Host openinsure-backend.braveriver-f92a9f28.swedencentral.azurecontainerapps.io;
        proxy_ssl_server_name on;
    }

    location /openapi.json {
        proxy_pass https://openinsure-backend.braveriver-f92a9f28.swedencentral.azurecontainerapps.io;
        proxy_set_header Host openinsure-backend.braveriver-f92a9f28.swedencentral.azurecontainerapps.io;
        proxy_ssl_server_name on;
    }
}
