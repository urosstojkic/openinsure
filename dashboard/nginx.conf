server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker/Azure DNS and re-resolve periodically
    resolver 127.0.0.11 valid=30s;
    set $backend "https://openinsure-backend.proudplant-9550e5a5.swedencentral.azurecontainerapps.io";

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass $backend;
        proxy_set_header Host openinsure-backend.proudplant-9550e5a5.swedencentral.azurecontainerapps.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Key $OPENINSURE_API_KEY;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    location /health {
        proxy_pass $backend;
        proxy_set_header Host openinsure-backend.proudplant-9550e5a5.swedencentral.azurecontainerapps.io;
        proxy_ssl_server_name on;
    }

    location /docs {
        proxy_pass $backend;
        proxy_set_header Host openinsure-backend.proudplant-9550e5a5.swedencentral.azurecontainerapps.io;
        proxy_ssl_server_name on;
    }

    location /openapi.json {
        proxy_pass $backend;
        proxy_set_header Host openinsure-backend.proudplant-9550e5a5.swedencentral.azurecontainerapps.io;
        proxy_ssl_server_name on;
    }
}
